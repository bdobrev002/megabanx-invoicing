; MegaBanx v2 — Alembic configuration.
; All runtime values (sqlalchemy.url) are loaded from the application settings
; in alembic/env.py; do not duplicate connection strings here.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = %(here)s
version_path_separator = os
timezone = UTC
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations = %(here)s/alembic/versions

; Post-write hooks are intentionally empty. Formatting is enforced by CI
; (ruff check + ruff format --check), so local revisions do not need to shell
; out to ruff and do not fail when running in a slim venv.
[post_write_hooks]
hooks =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
